server:
  port: ${ANALYTICS_PORT:8089}
  shutdown: graceful

spring:
  application:
    name: analytics-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      connect-timeout: 2s

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${ANALYTICS_DB_SCHEMA:analytics}
        format_sql: true
    show-sql: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: record
      missing-topics-fatal: false
      observation-enabled: true
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.knalis.contracts.event
    template:
      observation-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${HOSTNAME:${spring.application.name}}

logging:
  level:
    root: INFO
    org.springframework.security: INFO

app:
  analytics:
    jwt:
      issuer: ${JWT_ISSUER:dev.knalis.auth-service}
      audience: ${JWT_AUDIENCE:dev.knalis.api}
      public-key-path: ${JWT_PUBLIC_KEY_PATH:file:/opt/keys/public.pem}
    education-service:
      base-url: ${ANALYTICS_EDUCATION_SERVICE_BASE_URL:http://localhost:8085}
      connect-timeout: ${ANALYTICS_EDUCATION_SERVICE_CONNECT_TIMEOUT:2s}
      read-timeout: ${ANALYTICS_EDUCATION_SERVICE_READ_TIMEOUT:5s}
      shared-secret: ${EDUCATION_INTERNAL_SHARED_SECRET}
    risk:
      inactivity-days-for-medium-risk: ${ANALYTICS_INACTIVITY_DAYS_FOR_MEDIUM_RISK:7}
      inactivity-days-for-high-risk: ${ANALYTICS_INACTIVITY_DAYS_FOR_HIGH_RISK:14}
      low-average-score-threshold: ${ANALYTICS_LOW_AVERAGE_SCORE_THRESHOLD:60}
      high-risk-missed-deadlines-threshold: ${ANALYTICS_HIGH_RISK_MISSED_DEADLINES_THRESHOLD:3}
      medium-risk-missed-deadlines-threshold: ${ANALYTICS_MEDIUM_RISK_MISSED_DEADLINES_THRESHOLD:1}
      late-submission-penalty: ${ANALYTICS_LATE_SUBMISSION_PENALTY:10}
      missed-deadline-penalty: ${ANALYTICS_MISSED_DEADLINE_PENALTY:25}
      performance-trend-delta-threshold: ${ANALYTICS_PERFORMANCE_TREND_DELTA_THRESHOLD:5}
    kafka:
      topics:
        lecture-opened: content.lecture-opened.v1
        topic-opened: education.topic-opened.v1
        assignment-opened: assignment.assignment-opened.v1
        assignment-submitted: assignment.assignment-submitted.v1
        deadline-missed: academic.deadline-missed.v1
        test-started: testing.test-started.v1
        test-completed: testing.test-completed.v1
        assignment-created: assignment.assignment-created.v1
        grade-assigned: assignment.grade-assigned.v1
        test-published: testing.test-published.v1
