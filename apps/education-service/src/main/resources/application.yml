server:
  port: ${EDUCATION_PORT:8085}
  shutdown: graceful

spring:
  application:
    name: education-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}?currentSchema=${EDUCATION_DB_SCHEMA:education}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      connect-timeout: 2s

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: record
      missing-topics-fatal: false
      observation-enabled: true
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.knalis.contracts.event
    template:
      observation-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${HOSTNAME:${spring.application.name}}

logging:
  level:
    root: INFO
    org.springframework.security: INFO

app:
  education:
    jwt:
      issuer: ${JWT_ISSUER:dev.knalis.auth-service}
      audience: ${JWT_AUDIENCE:dev.knalis.api}
      public-key-path: ${JWT_PUBLIC_KEY_PATH:file:/opt/keys/public.pem}
    internal:
      shared-secret: ${EDUCATION_INTERNAL_SHARED_SECRET}
    audit-service:
      base-url: ${EDUCATION_AUDIT_SERVICE_BASE_URL:http://localhost:8090}
      connect-timeout: ${EDUCATION_AUDIT_SERVICE_CONNECT_TIMEOUT:2s}
      read-timeout: ${EDUCATION_AUDIT_SERVICE_READ_TIMEOUT:5s}
      shared-secret: ${AUDIT_INTERNAL_SHARED_SECRET}
