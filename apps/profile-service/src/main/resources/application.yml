server:
  port: ${PROFILE_PORT:8082}
  shutdown: graceful

spring:
  application:
    name: profile-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: true
    baseline-version: 0
    schemas: ${PROFILE_DB_SCHEMA:profile}
    default-schema: ${PROFILE_DB_SCHEMA:profile}
    create-schemas: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      connect-timeout: 2s

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${PROFILE_DB_SCHEMA:profile}
        format_sql: true
    show-sql: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: record
      missing-topics-fatal: false
      observation-enabled: true
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: dev.knalis.contracts.event
    template:
      observation-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${HOSTNAME:${spring.application.name}}

logging:
  level:
    root: INFO
    org.springframework.security: INFO

app:
  kafka:
    topics:
      user-registered: auth.user-registered.v1
      user-email-changed: auth.user-email-changed.v1
      user-username-changed: auth.user-username-changed.v1
  profile:
    jwt:
      issuer: ${JWT_ISSUER:dev.knalis.auth-service}
      audience: ${JWT_AUDIENCE:dev.knalis.api}
      public-key-path: ${JWT_PUBLIC_KEY_PATH:file:/opt/keys/public.pem}
    storage:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ROOT_USER:minio}
      secret-key: ${MINIO_ROOT_PASSWORD:minio123}
      public-bucket: ${MINIO_BUCKET_PUBLIC:public}
      private-bucket: ${MINIO_BUCKET_PRIVATE:private}
    avatar:
      max-size-bytes: ${PROFILE_MAX_AVATAR_SIZE_BYTES:5242880}
    file-service:
      base-url: ${FILE_SERVICE_BASE_URL:http://localhost:8083}
      connect-timeout: ${FILE_SERVICE_CONNECT_TIMEOUT:2s}
      read-timeout: ${FILE_SERVICE_READ_TIMEOUT:5s}
    search:
      max-size: ${PROFILE_MAX_SEARCH_SIZE:50}
