global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 60s
    timeout server 60s

resolvers docker
    nameserver dns 127.0.0.11:53
    accepted_payload_size 8192
    hold valid 2s
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s

frontend fe_gateway
    bind *:8080
    default_backend be_gateway

frontend fe_frontend
    bind *:3000
    default_backend be_frontend

frontend fe_auth
    bind *:18081
    default_backend be_auth

frontend fe_profile
    bind *:18082
    default_backend be_profile

frontend fe_file
    bind *:18083
    default_backend be_file

frontend fe_notification
    bind *:18084
    default_backend be_notification

frontend fe_education
    bind *:18085
    default_backend be_education

frontend fe_assignment
    bind *:18086
    default_backend be_assignment

frontend fe_testing
    bind *:18087
    default_backend be_testing

frontend fe_schedule
    bind *:18088
    default_backend be_schedule

frontend fe_analytics
    bind *:18089
    default_backend be_analytics

frontend fe_audit
    bind *:18090
    default_backend be_audit

frontend fe_content
    bind *:18091
    default_backend be_content

backend be_gateway
    balance roundrobin
    option httpchk GET /actuator/health
    http-check expect status 200
    server-template gateway 5 gateway:8080 check resolvers docker resolve-prefer ipv4 init-addr none

backend be_frontend
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server-template frontend 5 frontend:80 check resolvers docker resolve-prefer ipv4 init-addr none

backend be_auth
    balance roundrobin
