name: studium-local

x-db-pool-env: &db-pool-env
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-4}
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-0}
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:-30000}
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:-600000}
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-10000}

services:
  postgres:
    image: postgres:16-alpine
    container_name: studium-postgres
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-250}
      - -c
      - superuser_reserved_connections=${POSTGRES_SUPERUSER_RESERVED_CONNECTIONS:-10}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: studium-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      LISTEN_ADDR: 0.0.0.0
      LISTEN_PORT: 6432

      AUTH_TYPE: scram-sha-256

      POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-1000}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
      RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-5}
      RESERVE_POOL_TIMEOUT: ${PGBOUNCER_RESERVE_POOL_TIMEOUT:-5}
      SERVER_RESET_QUERY: DISCARD ALL
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy

  service-lb:
    image: haproxy:2.9-alpine
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
      - "${FRONTEND_PORT:-3000}:3000"

  redis:
    image: redis:7-alpine
    container_name: studium-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: studium-kafka
    ports:
      - "${KAFKA_PORT:-29092}:${KAFKA_PORT:-29092}"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:${KAFKA_PORT:-29092},CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-29092}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: studium-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./init/init-db.sh:/scripts/init-db.sh:ro
    entrypoint: ["bash", "/scripts/init-db.sh"]

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./init/init-kafka.sh:/scripts/init-kafka.sh:ro
    entrypoint: ["bash", "/scripts/init-kafka.sh"]

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ../../.env
    volumes:
      - ./init/init-minio.sh:/scripts/init-minio.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]

  auth-service:
    build:
      context: ../../apps/auth-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTH_AUDIT_SERVICE_BASE_URL: http://audit-service:8090
      AUDIT_INTERNAL_SHARED_SECRET: ${AUDIT_INTERNAL_SHARED_SECRET:-change-me-audit-internal}
      JWT_PRIVATE_KEY_PATH: file:/opt/keys/private.pem
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  profile-service:
    build:
      context: ../../apps/profile-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      FILE_SERVICE_BASE_URL: http://service-lb:18083
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  education-service:
    build:
      context: ../../apps/education-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EDUCATION_INTERNAL_SHARED_SECRET: ${EDUCATION_INTERNAL_SHARED_SECRET:-change-me-education-internal}
      EDUCATION_AUDIT_SERVICE_BASE_URL: http://audit-service:8090
      AUDIT_INTERNAL_SHARED_SECRET: ${AUDIT_INTERNAL_SHARED_SECRET:-change-me-audit-internal}
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  schedule-service:
    build:
      context: ../../apps/schedule-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EDUCATION_INTERNAL_SHARED_SECRET: ${EDUCATION_INTERNAL_SHARED_SECRET:-change-me-education-internal}
      SCHEDULE_AUDIT_SERVICE_BASE_URL: http://service-lb:18090
      AUDIT_INTERNAL_SHARED_SECRET: ${AUDIT_INTERNAL_SHARED_SECRET:-change-me-audit-internal}
      NOTIFICATION_EDUCATION_SERVICE_BASE_URL: http://service-lb:18085
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  assignment-service:
    build:
      context: ../../apps/assignment-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FILE_SERVICE_BASE_URL: http://service-lb:18083
      ASSIGNMENT_EDUCATION_SERVICE_BASE_URL: http://service-lb:18085
      ASSIGNMENT_NOTIFICATION_SERVICE_BASE_URL: http://service-lb:18084
      ASSIGNMENT_AUDIT_SERVICE_BASE_URL: http://service-lb:18090
      EDUCATION_INTERNAL_SHARED_SECRET: ${EDUCATION_INTERNAL_SHARED_SECRET:-change-me-education-internal}
      NOTIFICATION_INTERNAL_SHARED_SECRET: ${NOTIFICATION_INTERNAL_SHARED_SECRET:-change-me-notification-internal}
      AUDIT_INTERNAL_SHARED_SECRET: ${AUDIT_INTERNAL_SHARED_SECRET:-change-me-audit-internal}
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  content-service:
    build:
      context: ../../apps/content-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONTENT_EDUCATION_SERVICE_BASE_URL: http://service-lb:18085
      EDUCATION_INTERNAL_SHARED_SECRET: ${EDUCATION_INTERNAL_SHARED_SECRET:-change-me-education-internal}
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  testing-service:
    build:
      context: ../../apps/testing-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TESTING_EDUCATION_SERVICE_BASE_URL: http://service-lb:18085
      TESTING_NOTIFICATION_SERVICE_BASE_URL: http://service-lb:18084
      TESTING_AUDIT_SERVICE_BASE_URL: http://service-lb:18090
      EDUCATION_INTERNAL_SHARED_SECRET: ${EDUCATION_INTERNAL_SHARED_SECRET:-change-me-education-internal}
      NOTIFICATION_INTERNAL_SHARED_SECRET: ${NOTIFICATION_INTERNAL_SHARED_SECRET:-change-me-notification-internal}
      AUDIT_INTERNAL_SHARED_SECRET: ${AUDIT_INTERNAL_SHARED_SECRET:-change-me-audit-internal}
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  file-service:
    build:
      context: ../../apps/file-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      MINIO_ENDPOINT: http://minio:9000
      FILE_INTERNAL_SHARED_SECRET: ${FILE_INTERNAL_SHARED_SECRET:-change-me-file-internal}
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      minio:
        condition: service_healthy

  analytics-service:
    build:
      context: ../../apps/analytics-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANALYTICS_EDUCATION_SERVICE_BASE_URL: http://service-lb:18085
      EDUCATION_INTERNAL_SHARED_SECRET: ${EDUCATION_INTERNAL_SHARED_SECRET:-change-me-education-internal}
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  audit-service:
    build:
      context: ../../apps/audit-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
      AUDIT_INTERNAL_SHARED_SECRET: ${AUDIT_INTERNAL_SHARED_SECRET:-change-me-audit-internal}
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: ../../apps/notification-service
    env_file:
      - ../../.env
    environment:
      <<: *db-pool-env
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 6432
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATION_EDUCATION_SERVICE_BASE_URL: http://service-lb:18085
      EDUCATION_INTERNAL_SHARED_SECRET: ${EDUCATION_INTERNAL_SHARED_SECRET:-change-me-education-internal}
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      audit-service:
        condition: service_started

  gateway:
    build:
      context: ../../apps/gateway
    env_file:
      - ../../.env
    environment:
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTH_ROUTE_HOST: service-lb
      AUTH_ROUTE_PORT: 18081
      PROFILE_ROUTE_HOST: service-lb
      PROFILE_ROUTE_PORT: 18082
      FILE_ROUTE_HOST: service-lb
      FILE_ROUTE_PORT: 18083
      NOTIFICATION_ROUTE_HOST: service-lb
      NOTIFICATION_ROUTE_PORT: 18084
      EDUCATION_ROUTE_HOST: service-lb
      EDUCATION_ROUTE_PORT: 18085
      ASSIGNMENT_ROUTE_HOST: service-lb
      ASSIGNMENT_ROUTE_PORT: 18086
      CONTENT_ROUTE_HOST: service-lb
      CONTENT_ROUTE_PORT: 18091
      TESTING_ROUTE_HOST: service-lb
      TESTING_ROUTE_PORT: 18087
      SCHEDULE_ROUTE_HOST: service-lb
      SCHEDULE_ROUTE_PORT: 18088
      ANALYTICS_ROUTE_HOST: service-lb
      ANALYTICS_ROUTE_PORT: 18089
      AUDIT_ROUTE_HOST: service-lb
      AUDIT_ROUTE_PORT: 18090
      GATEWAY_EDUCATION_SERVICE_BASE_URL: http://service-lb:18085
      GATEWAY_SCHEDULE_SERVICE_BASE_URL: http://service-lb:18088
      GATEWAY_ASSIGNMENT_SERVICE_BASE_URL: http://service-lb:18086
      GATEWAY_TESTING_SERVICE_BASE_URL: http://service-lb:18087
      GATEWAY_AUTH_SERVICE_BASE_URL: http://service-lb:18081
      GATEWAY_ANALYTICS_SERVICE_BASE_URL: http://service-lb:18089
      GATEWAY_NOTIFICATION_SERVICE_BASE_URL: http://service-lb:18084
      GATEWAY_AUDIT_SERVICE_BASE_URL: http://service-lb:18090
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      JWT_PUBLIC_KEY_PATH: file:/opt/keys/public.pem
    volumes:
      - ../keys:/opt/keys:ro
    depends_on:
      auth-service:
        condition: service_started
      profile-service:
        condition: service_started
      education-service:
        condition: service_started
      schedule-service:
        condition: service_started
      assignment-service:
        condition: service_started
      content-service:
        condition: service_started
      testing-service:
        condition: service_started
      file-service:
        condition: service_started
      analytics-service:
        condition: service_started
      audit-service:
        condition: service_started
      notification-service:
        condition: service_started
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ../../apps/frontend
      args:
        VITE_API_BASE_URL: ${FRONTEND_VITE_API_BASE_URL:-http://localhost:8080}
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  minio-data:
